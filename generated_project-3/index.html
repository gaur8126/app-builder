<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="calculator" class="calculator">
        <div id="display" class="calculator__display" aria-live="polite" role="region" aria-label="Calculator display">0</div>
        <div class="calculator__keys" role="group" aria-label="Calculator keys">
            <!-- Digits -->
            <button type="button" class="key key--digit" data-value="7" aria-label="7" role="button">7</button>
            <button type="button" class="key key--digit" data-value="8" aria-label="8" role="button">8</button>
            <button type="button" class="key key--digit" data-value="9" aria-label="9" role="button">9</button>
            <button type="button" class="key key--operator" data-operator="/" aria-label="divide" role="button">/</button>

            <button type="button" class="key key--digit" data-value="4" aria-label="4" role="button">4</button>
            <button type="button" class="key key--digit" data-value="5" aria-label="5" role="button">5</button>
            <button type="button" class="key key--digit" data-value="6" aria-label="6" role="button">6</button>
            <button type="button" class="key key--operator" data-operator="*" aria-label="multiply" role="button">*</button>

            <button type="button" class="key key--digit" data-value="1" aria-label="1" role="button">1</button>
            <button type="button" class="key key--digit" data-value="2" aria-label="2" role="button">2</button>
            <button type="button" class="key key--digit" data-value="3" aria-label="3" role="button">3</button>
            <button type="button" class="key key--operator" data-operator="-" aria-label="subtract" role="button">-</button>

            <button type="button" class="key key--digit" data-value="0" aria-label="0" role="button">0</button>
            <button type="button" class="key key--digit" data-value="." aria-label="decimal point" role="button">.</button>
            <button type="button" class="key key--clear" data-action="clear" aria-label="clear" role="button">C</button>
            <button type="button" class="key key--operator" data-operator="+" aria-label="add" role="button">+</button>

            <button type="button" class="key key--equals" data-action="equals" aria-label="equals" role="button" style="grid-column: span 4;">=</button>
        </div>
    </div>
</body>
</html>
